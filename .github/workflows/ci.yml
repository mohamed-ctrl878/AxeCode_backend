name: AxeCode Backend CI/CD

on:
  push:
    branches: [ main, staging ]
  pull_request:
    branches: [ main, staging ]

jobs:
  test:
    name: Run Test Suites
    runs-on: self-hosted # Assuming we use the self-hosted Ubuntu VM previously discussed

    strategy:
      matrix:
        node-version: [18.x]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      # Execute core business logic tests
      - name: Run Unit Tests
        run: npx vitest run tests/unit/
        
      # Execute integration layer with Mock DB
      - name: Run Integration Tests
        run: npx vitest run tests/integration/

      # Execute full API endpoints (Auth & Content Flow)
      - name: Run E2E API Tests
        run: npx vitest run tests/e2e/

      # Log result metric for badges
      - name: Test Summary Report
        if: always()
        run: echo "Tests finished with status - ${{ job.status }}"
