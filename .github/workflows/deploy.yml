# ============================================================
# AxeCode Backend - Auto Deploy via GitHub Self-Hosted Runner
# ============================================================
# This workflow runs ON the VM itself (self-hosted runner).
# It triggers on push to main, pulls the latest code, builds
# the Docker image locally, and restarts the services.
#
# SECURITY: Only triggers on push (NOT pull_request) because
# the repo is public and we don't want untrusted code running
# on our server.
# ============================================================

name: Deploy Backend to VM

on:
  push:
    branches: [main]
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  deploy:
    name: Build & Deploy
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Load Environment Secrets
        run: cp $HOME/axecode-backend/.env.production .env.production

      - name: Verify .env.production exists
        run: |
          if [ ! -f .env.production ]; then
            echo "❌ ERROR: .env.production not found!"
            echo "Please create it from .env.production.example"
            exit 1
          fi

      - name: Auto-patch missing secrets
        run: |
          # Helper to generate and replace secrets
          patch_secret() {
            local key=$1
            if ! grep -q "^${key}=" .env.production || grep -q "^${key}=CHANGE_ME" .env.production || grep -q "^${key}=\s*$" .env.production; then
              echo "  --> Patching: ${key}"
              local new_val=$(openssl rand -base64 32 | tr -d '\n')
              if grep -q "^${key}=" .env.production; then
                sed -i "s|^${key}=.*|${key}=${new_val}|" .env.production
              else
                echo "${key}=${new_val}" >> .env.production
              fi
            fi
          }

          echo "🔍 Checking environment secrets..."
          
          # Special handling for APP_KEYS (comma separated)
          if ! grep -q "^APP_KEYS=" .env.production || grep -q "CHANGE_ME" <<< "$(grep "^APP_KEYS=" .env.production)"; then
            echo "  --> Patching: APP_KEYS"
            K1=$(openssl rand -base64 16); K2=$(openssl rand -base64 16); K3=$(openssl rand -base64 16); K4=$(openssl rand -base64 16)
            APP_VAL="${K1},${K2},${K3},${K4}"
            sed -i "s|^APP_KEYS=.*|APP_KEYS=${APP_VAL}|" .env.production || echo "APP_KEYS=${APP_VAL}" >> .env.production
          fi

          patch_secret "API_TOKEN_SALT"
          patch_secret "ADMIN_JWT_SECRET"
          patch_secret "TRANSFER_TOKEN_SALT"
          patch_secret "JWT_SECRET"

          # Sync back to VM storage so it persists
          cp .env.production $HOME/axecode-backend/.env.production
          echo "✅ Secrets verified and patched."

      - name: Stop existing containers
        run: docker compose --env-file .env.production down --remove-orphans || true

      - name: Build Docker image
        run: docker compose --env-file .env.production build strapi

      - name: Start all services
        run: docker compose --env-file .env.production up -d

      - name: Auto-update PUBLIC_URL from Cloudflare Tunnel
        run: |
          echo "⏳ Waiting for Cloudflare Tunnel to generate URL..."
          sleep 15
          TUNNEL_URL=$(docker compose --env-file .env.production logs cloudflared | grep -o 'https://[a-zA-Z0-9.-]*\.trycloudflare\.com' | head -n 1)
          
          if [ -n "$TUNNEL_URL" ]; then
            echo "🚀 Found Tunnel URL: $TUNNEL_URL"
            if grep -q "^PUBLIC_URL=" .env.production; then
              sed -i "s|^PUBLIC_URL=.*|PUBLIC_URL=${TUNNEL_URL}|" .env.production
            else
              echo "PUBLIC_URL=${TUNNEL_URL}" >> .env.production
            fi
            cp .env.production $HOME/axecode-backend/.env.production
            echo "♻️ Recreating Strapi with new PUBLIC_URL..."
            docker compose --env-file .env.production up -d --force-recreate strapi
          else
            echo "⚠️ Could not find Cloudflare Tunnel URL in logs."
          fi

      - name: Wait for health check
        run: |
          echo "⏳ Waiting for Strapi to start (up to 120s)..."
          for i in $(seq 1 24); do
            if curl -sf http://localhost:1338/_health > /dev/null 2>&1; then
              echo "✅ Strapi is healthy!"
              exit 0
            fi
            echo "  Attempt $i/24 - waiting 5s..."
            sleep 5
          done
          echo "❌ Strapi failed to start within 120s"
          docker compose logs strapi --tail 50
          exit 1

      - name: Show running containers
        if: always()
        run: docker compose --env-file .env.production ps

      - name: Cleanup old Docker images & build cache
        if: success()
        run: |
          echo "🧹 Cleaning unused Docker images, containers, and networks..."
          docker system prune -af
          echo "🧹 Cleaning Docker build cache..."
          docker builder prune -af
          echo "📊 Current Docker disk usage:"
          docker system df
