services:
  # ============================================
  # Strapi Backend
  # ============================================
  strapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: axe-strapi
    restart: unless-stopped
    env_file: .env.production
    environment:
      - NODE_ENV=production
      - DATABASE_CLIENT=postgres
      - DATABASE_HOST=db
      - DATABASE_PORT=5432
      - DATABASE_NAME=axecode
      - DATABASE_USERNAME=axecode
      - DATABASE_SSL=false
    ports:
      - "1338:1338"
    volumes:
      - strapi-uploads:/app/public/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - axe-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:1338/_health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ============================================
  # PostgreSQL Database
  # ============================================
  db:
    image: postgres:16-alpine
    container_name: axe-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=axecode
      - POSTGRES_USER=axecode
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - axe-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U axecode -d axecode"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ============================================
  # MediaMTX Streaming Server
  # ============================================
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: axe-media-server
    restart: unless-stopped
    ports:
      - "1935:1935"
      - "8888:8888"
      - "8554:8554"
      - "8889:8889"
      - "8890:8890"
      - "9997:9997"
    volumes:
      - ./mediamtx.yml:/mediamtx.yml
      - media-recordings:/recordings
    environment:
      - MTX_PROTOCOLS=tcp
    networks:
      - axe-network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ============================================
  # Nginx Proxy Manager (SSL & Proxy)
  # ============================================
  nginx-proxy-manager:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: axe-nginx-proxy
    restart: unless-stopped
    ports:
      - '80:80'
      - '81:81'
      - '443:443'
    volumes:
      - npm-data:/data
      - npm-letsencrypt:/etc/letsencrypt
    networks:
      - axe-network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"


  # ============================================
  # Judge0 - Self-Hosted Execution Engine
  # ============================================
  judge0-api:
    image: judge0/judge0:latest
    container_name: axe-judge0-api
    restart: unless-stopped
    privileged: true
    ports:
      - "2358:2358"
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    networks:
      - axe-network
    depends_on:
      judge0-db:
        condition: service_healthy
      judge0-redis:
        condition: service_healthy

  judge0-worker:
    image: judge0/judge0:latest
    container_name: axe-judge0-worker
    restart: unless-stopped
    command: ["./scripts/workers"]
    privileged: true
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    networks:
      - axe-network
    depends_on:
      judge0-db:
        condition: service_healthy
      judge0-redis:
        condition: service_healthy

  judge0-db:
    image: postgres:16-alpine
    container_name: axe-judge0-db
    restart: unless-stopped
    env_file: judge0.conf
    volumes:
      - judge0-db-data:/var/lib/postgresql/data
    networks:
      - axe-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U judge0"]
      interval: 10s
      timeout: 5s
      retries: 5

  judge0-redis:
    image: redis:7-alpine
    container_name: axe-judge0-redis
    restart: unless-stopped
    command: [ "sh", "-c", 'docker-entrypoint.sh --appendonly no --requirepass "$$REDIS_PASSWORD"' ]
    env_file: judge0.conf
    networks:
      - axe-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "judge0_redis_pass_456", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

# ============================================
# Persistent Volumes
# ============================================
volumes:
  postgres-data:
    driver: local
  strapi-uploads:
    driver: local
  media-recordings:
    driver: local
  npm-data:
    driver: local
  npm-letsencrypt:
    driver: local
  judge0-db-data:
    driver: local

# ============================================
# Network
# ============================================
networks:
  axe-network:
    driver: bridge
